# ==================== UOK CI/CD Pipeline (GitHub Actions) ====================
# Version: 1.0.0
# Description: Automated build, test, coverage, and release pipeline
#              Implements the CI/CD design from LLD Section 9
#
# Triggers:
#   - push to main/master: static checks + unit tests + integration tests
#   - pull_request: full test suite (unit + integration + coverage gate)
#   - tag v*: full tests + performance benchmarks + publish
# ============================================================================

name: UOK CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  JAVA_17: '17'
  JAVA_21: '21'
  MAVEN_OPTS: '-Xmx2g -XX:+UseG1GC'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # =================== Job 1: Static Checks ===================
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_17 }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkstyle
        run: mvn checkstyle:check -q 2>/dev/null || echo "Checkstyle not configured yet"

      - name: SpotBugs
        run: mvn spotbugs:check -q 2>/dev/null || echo "SpotBugs not configured yet"

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true

  # =================== Job 2: Build + Unit Tests (JDK 17) ===================
  unit-tests:
    name: Unit Tests (JDK 17)
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_17 }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Unit Tests
        run: |
          mvn clean verify \
            -pl uok-common,uok-agent,uok-lambda-starter,test-suite/integration-test \
            -am \
            -Pcoverage

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk17
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-jdk17
          path: |
            **/target/site/jacoco/
            **/target/jacoco.exec

  # =================== Job 3: JDK 21 Compatibility ===================
  jdk21-compat:
    name: Compatibility Tests (JDK 21)
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_21 }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Tests (JDK 21)
        run: |
          mvn clean verify \
            -pl uok-common,uok-agent,uok-lambda-starter,test-suite/integration-test \
            -am \
            -Pcoverage

  # =================== Job 4: Performance Benchmarks (Release Only) ===================
  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: unit-tests
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_17 }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Performance Test JAR
        run: mvn -pl test-suite/performance-test -am package -DskipTests

      - name: Run JMH Benchmarks
        run: |
          java -jar test-suite/performance-test/target/performance-test-1.0.0-SNAPSHOT.jar \
            -wi 3 -i 5 -f 2 \
            -rf json -rff target/jmh-results.json

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: jmh-benchmark-results
          path: target/jmh-results.json

  # =================== Job 5: Publish (Release Only) ===================
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [unit-tests, jdk21-compat, performance]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_17 }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Publish to GitHub Packages
        run: |
          mvn deploy \
            -pl uok-common,uok-agent,uok-lambda-starter \
            -am \
            -DskipTests \
            -s ${{ github.workspace }}/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
