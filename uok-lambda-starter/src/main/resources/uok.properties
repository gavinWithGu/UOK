# UOK Lambda Starter Default Configuration
# Property keys match ConfigLoader's expected keys
# These defaults can be overridden via system properties or environment variables

# Feature Flags
uok.metrics.enable=false

# Sampling Configuration
uok.sampler.head-rate=1.0
uok.sampler.error-always=true
uok.sampler.device-ratio=1.0

# Degradation Thresholds
uok.degrade.cpu-threshold=90
uok.degrade.latency-increase=20
